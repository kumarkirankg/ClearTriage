<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPrep</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // NO IMPORT STATEMENTS. Use React global instead.
        const { useState } = React;

        const SAMPLE_QUERIES = [
            { label: "ACE inhibitor cough", text: "I've been taking ramipril 5mg for two weeks now and I've developed a really persistent dry cough. Is this normal and should I stop taking it or carry on?" },
            { label: "Ran out of blood pressure tablets", text: "I've run out of my amlodipine and can't get an appointment for three weeks. I've already missed two days of doses. Can I just stop taking it until I see the doctor or is that dangerous?" },
            { label: "Child's fever not settling", text: "My 8-year-old has had a temperature of 39.5 since last night. I gave calpol five hours ago but it hasn't come down much. How much ibuprofen can I give and is it safe to give both together?" }
        ];

        function MedPrep() {
            const [query, setQuery] = useState("");
            const [loading, setLoading] = useState(false);

            const analyzeQuery = async () => {
                setLoading(true);
                // Your existing logic here
                setTimeout(() => setLoading(false), 1000); // Placeholder
            };

            return (
                <div style={{ maxWidth: 660, margin: "0 auto", padding: "20px" }}>
                    <h1>MedPrep</h1>
                    <textarea 
                        value={query} 
                        onChange={(e) => setQuery(e.target.value)}
                        placeholder="Paste transcript here..."
                        style={{ width: "100%", height: "100px" }}
                    />
                    <button onClick={analyzeQuery} disabled={loading}>
                        {loading ? "Analysing..." : "Analyse and triage"}
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MedPrep />);
    </script>
</body>
</html>
