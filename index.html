<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedPrep Prototype</title>
  
  <!-- CDN Imports for React and Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <div id="root"></div>

  <!-- IMPORTANT: type="text/babel" is required for the browser to run this -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function MedPrep() {
      const [query, setQuery] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("MEDPREP_GEMINI_KEY") || "");

      useEffect(() => {
        localStorage.setItem("MEDPREP_GEMINI_KEY", apiKey);
      }, [apiKey]);

      const analyzeQuery = async () => {
        if (!apiKey) {
            setError("Please enter an API Key.");
            return;
        }
        setLoading(true);
        setError(null);
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: query }] }]
                })
            });
            const data = await response.json();
            alert("API Response: " + JSON.stringify(data));
        } catch (err) {
            setError("Analysis failed.");
        } finally {
            setLoading(false);
        }
      };

      return (
        <div style={{ padding: "20px", fontFamily: "sans-serif" }}>
          <h2>MedPrep</h2>
          <input 
            type="password" 
            placeholder="Paste Gemini API Key" 
            value={apiKey} 
            onChange={(e) => setApiKey(e.target.value)}
            style={{ width: "100%", padding: "10px", marginBottom: "10px" }}
          />
          <textarea 
            rows="4" 
            value={query} 
            onChange={(e) => setQuery(e.target.value)} 
            style={{ width: "100%", padding: "10px" }}
          />
          <button onClick={analyzeQuery} style={{ width: "100%", padding: "10px", marginTop: "10px" }}>
            {loading ? "Processing..." : "Analyze"}
          </button>
          {error && <p style={{ color: "red" }}>{error}</p>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MedPrep />);
  </script>
</body>
</html>
